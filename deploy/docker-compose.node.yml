# CorridorKey Node Agent — remote GPU worker
#
# Run:  docker compose -f deploy/docker-compose.node.yml up -d
# Stop: docker compose -f deploy/docker-compose.node.yml down
#
# Copy deploy/.env.example to deploy/.env and edit before starting.
# At minimum, set CK_MAIN_URL to the main server's address.

services:
  corridorkey-node:
    image: ghcr.io/jamesnyevrguy/corridorkey-node:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OPENCV_IO_ENABLE_OPENEXR=1
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - CK_MAIN_URL=${CK_MAIN_URL:?Set CK_MAIN_URL to the main server address}
      - CK_NODE_NAME=${CK_NODE_NAME:-docker-node}
      - CK_NODE_GPUS=${CK_NODE_GPUS:-auto}
      - CK_SHARED_STORAGE=${CK_SHARED_STORAGE:-}
    volumes:
      # Mount shared projects directory if using shared storage.
      # Leave CK_SHARED_STORAGE empty to use HTTP file transfer instead.
      - ${CK_PROJECTS_DIR:-./Projects}:/app/Projects
