services:
  corridorkey:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile
    image: corridorkey:latest
    gpus: ${CK_GPUS:-all}
    environment:
      - OPENCV_IO_ENABLE_OPENEXR=1
      # Use "all", "0", "1", or CSV like "0,1" for multi-GPU pinning.
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      # Add graphics if needed for GUI/OpenGL workloads.
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}
    volumes:
      - ./ClipsForInference:/app/ClipsForInference
      - ./Output:/app/Output
      - ./CorridorKeyModule/checkpoints:/app/CorridorKeyModule/checkpoints
      - ./gvm_core/weights:/app/gvm_core/weights
      - ./VideoMaMaInferenceModule/checkpoints:/app/VideoMaMaInferenceModule/checkpoints
    stdin_open: true
    tty: true

  corridorkey-cpu:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: Dockerfile
    image: corridorkey:latest
    volumes:
      - ./ClipsForInference:/app/ClipsForInference
      - ./Output:/app/Output
      - ./CorridorKeyModule/checkpoints:/app/CorridorKeyModule/checkpoints
      - ./gvm_core/weights:/app/gvm_core/weights
      - ./VideoMaMaInferenceModule/checkpoints:/app/VideoMaMaInferenceModule/checkpoints
    stdin_open: true
    tty: true

  corridorkey-web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: web/Dockerfile.web
    image: corridorkey-web:latest
    user: "${UID:-1000}:${GID:-1000}"
    gpus: ${CK_GPUS:-all}
    ports:
      - "3000:3000"
    environment:
      - OPENCV_IO_ENABLE_OPENEXR=1
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}
      - CK_CLIPS_DIR=/app/Projects
    volumes:
      - ${CK_PROJECTS_DIR:-./Projects}:/app/Projects
      - ./CorridorKeyModule/checkpoints:/app/CorridorKeyModule/checkpoints
      - ./gvm_core/weights:/app/gvm_core/weights
      - ./VideoMaMaInferenceModule/checkpoints:/app/VideoMaMaInferenceModule/checkpoints

  corridorkey-node:
    profiles: ["node"]
    build:
      context: .
      dockerfile: web/Dockerfile.node
    image: corridorkey-node:latest
    gpus: ${CK_GPUS:-all}
    environment:
      - OPENCV_IO_ENABLE_OPENEXR=1
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}
      - CK_MAIN_URL=${CK_MAIN_URL:-http://corridorkey-web:3000}
      - CK_NODE_NAME=${CK_NODE_NAME:-docker-node}
      - CK_NODE_GPUS=${CK_NODE_GPUS:-auto}
      - CK_SHARED_STORAGE=${CK_SHARED_STORAGE:-/app/Projects}
    volumes:
      - ${CK_PROJECTS_DIR:-./Projects}:/app/Projects
      - ./CorridorKeyModule/checkpoints:/app/CorridorKeyModule/checkpoints
      - ./gvm_core/weights:/app/gvm_core/weights
      - ./VideoMaMaInferenceModule/checkpoints:/app/VideoMaMaInferenceModule/checkpoints
