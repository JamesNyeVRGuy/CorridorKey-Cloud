<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Plausible Analytics -->
    <script
      defer
      data-domain="corridorkey.cloud"
      src="https://plausible.sccs.swarthmore.edu/js/script.file-downloads.hash.js"
    ></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          (window.plausible.q = window.plausible.q || []).push(arguments);
        };
    </script>

    <!-- Open Graph — link previews on Discord, Slack, Twitter, etc. -->
    <meta property="og:title" content="CorridorKey" />
    <meta
      property="og:description"
      content="Neural green screen keyer for professional VFX pipelines. AI-powered alpha extraction, foreground recovery, and compositing-ready EXR output."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CorridorKey" />
    <meta
      name="twitter:description"
      content="Neural green screen keyer for professional VFX pipelines."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Cloudflare Turnstile (CAPTCHA) — loaded only on signup/login pages -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
