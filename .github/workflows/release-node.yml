name: Build & Release Node Binary

on:
  push:
    tags: ["node-v*", "cloud", "cloud-*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows NVIDIA (CUDA torch ~800MB wheel, binary ~1.5GB)
          - os: windows-latest
            artifact: corridorkey-node-nvidia-win-x64
            ext: .zip
            torch_cmd: "pip install torch==2.8.0 torchvision==0.23.0 --index-url https://download.pytorch.org/whl/cu128"
            python_version: "3.11"
          # Windows AMD (ROCm torch from AMD, binary ~1GB)
          - os: windows-latest
            artifact: corridorkey-node-amd-win-x64
            ext: .zip
            torch_cmd: "pip install --no-cache-dir https://repo.radeon.com/rocm/windows/rocm-rel-7.2/rocm-7.2.0.dev0.tar.gz https://repo.radeon.com/rocm/windows/rocm-rel-7.2/torch-2.9.1+rocmsdk20260116-cp312-cp312-win_amd64.whl https://repo.radeon.com/rocm/windows/rocm-rel-7.2/torchvision-0.24.1+rocmsdk20260116-cp312-cp312-win_amd64.whl"
            python_version: "3.12"
          # Linux users should use Docker (corridorkey-node:nvidia or :amd)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          cache: pip

      - name: Cache pip + PyInstaller
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
            ~/.cache/pip
            build/
          key: pyinstaller-${{ matrix.artifact }}-${{ hashFiles('pyproject.toml', 'web/node/corridorkey-node.spec') }}
          restore-keys: pyinstaller-${{ matrix.artifact }}-

      - name: Install dependencies
        run: |
          pip install pyinstaller
          ${{ matrix.torch_cmd }}
          pip install -e .
          pip install sniffio httpcore h11 anyio certifi

      - name: Embed version info
        run: |
          echo "CK_BUILD_COMMIT=${{ github.sha }}" > web/node/_version.env
          echo "CK_BUILD_NUMBER=$(git log -1 --format=%ct)" >> web/node/_version.env
          echo "CK_BUILD_TAG=${{ github.ref_name }}" >> web/node/_version.env

      - name: Build with PyInstaller
        run: pyinstaller web/node/corridorkey-node.spec --noconfirm

      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Copy example config next to the spec for Inno Setup
          Copy-Item web/node/node.env.example dist/corridorkey-node/node.env
          # Set version from tag (node-v0.0.1 → 0.0.1)
          $version = "${{ github.ref_name }}" -replace '^node-v','' -replace '^cloud.*','0.0.0-dev'
          (Get-Content web/node/installer.iss) -replace '#define MyAppVersion "1.0.0"', "#define MyAppVersion `"$version`"" | Set-Content web/node/installer.iss
          # Inno Setup is pre-installed on windows-latest runners
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" web/node/installer.iss

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Upload both the installer and the raw zip
          Compress-Archive -Path dist/corridorkey-node/* -DestinationPath ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.artifact }}${{ matrix.ext }} -C dist corridorkey-node

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}${{ matrix.ext }}
            dist/corridorkey-node-setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/node-v')
    steps:
      - uses: actions/download-artifact@v4

      - name: Install HuggingFace SDK
        run: pip install huggingface-hub

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "JamesNyeVRGuy/corridorkey-node"
          version = os.environ.get("GITHUB_REF_NAME", "dev")

          for variant in ["nvidia", "amd"]:
              d = f"corridorkey-node-{variant}-win-x64"

              # Upload zip
              zip_path = f"{d}/{d}.zip"
              if os.path.isfile(zip_path):
                  for prefix in [version, "latest"]:
                      api.upload_file(
                          path_or_fileobj=zip_path,
                          path_in_repo=f"{prefix}/{d}.zip",
                          repo_id=repo_id,
                      )
                      print(f"Uploaded {zip_path} -> {prefix}/{d}.zip")

              # Upload installer
              exe_path = f"{d}/dist/corridorkey-node-setup.exe"
              if os.path.isfile(exe_path):
                  for prefix in [version, "latest"]:
                      api.upload_file(
                          path_or_fileobj=exe_path,
                          path_in_repo=f"{prefix}/corridorkey-node-{variant}-setup.exe",
                          repo_id=repo_id,
                      )
                      print(f"Uploaded {exe_path} -> {prefix}/corridorkey-node-{variant}-setup.exe")
          PYEOF
