name: Build & Release Node Binary

on:
  push:
    tags: ["node-v*", "cloud", "cloud-*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: corridorkey-node-win-x64
            ext: .zip
          - os: ubuntu-22.04
            artifact: corridorkey-node-linux-x64
            ext: .tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install torch==2.8.0 torchvision==0.23.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -e .  # all deps including httpx, pystray, etc.
          pip install sniffio httpcore h11 anyio certifi  # ensure httpx transitive deps are present

      - name: Embed version info
        run: |
          echo "CK_BUILD_COMMIT=${{ github.sha }}" > web/node/_version.env
          echo "CK_BUILD_NUMBER=$(git log -1 --format=%ct)" >> web/node/_version.env
          echo "CK_BUILD_TAG=${{ github.ref_name }}" >> web/node/_version.env

      - name: Build with PyInstaller
        run: pyinstaller web/node/corridorkey-node.spec --noconfirm

      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Copy example config next to the spec for Inno Setup
          Copy-Item web/node/node.env.example dist/corridorkey-node/node.env
          # Set version from tag (node-v0.0.1 → 0.0.1)
          $version = "${{ github.ref_name }}" -replace '^node-v','' -replace '^cloud.*','0.0.0-dev'
          (Get-Content web/node/installer.iss) -replace '#define MyAppVersion "1.0.0"', "#define MyAppVersion `"$version`"" | Set-Content web/node/installer.iss
          # Inno Setup is pre-installed on windows-latest runners
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" web/node/installer.iss

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Upload both the installer and the raw zip
          Compress-Archive -Path dist/corridorkey-node/* -DestinationPath ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.artifact }}${{ matrix.ext }} -C dist corridorkey-node

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}${{ matrix.ext }}
            dist/corridorkey-node-setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/node-v')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Node Agent ${{ github.ref_name }}" \
            --generate-notes \
            corridorkey-node-win-x64/corridorkey-node-win-x64.zip \
            corridorkey-node-win-x64/dist/corridorkey-node-setup.exe \
            corridorkey-node-linux-x64/corridorkey-node-linux-x64.tar.gz
