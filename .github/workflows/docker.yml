name: Build & Publish Docker Images

on:
  push:
    branches: [main, feat/distributed-nodes, feat/cloud-platform]
    tags: ["v*", "cloud", "cloud-*", "stable"]
    paths:
      - "web/**"
      - "backend/**"
      - "device_utils.py"
      - "pyproject.toml"
      - "uv.lock"
      - "CorridorKeyModule/**"
      - "Dockerfile"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: corridorkey-web
            dockerfile: web/Dockerfile.web
          - image: corridorkey-node
            dockerfile: web/Dockerfile.node
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=cloud,enable=${{ startsWith(github.ref, 'refs/tags/cloud') }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/tags/stable' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
