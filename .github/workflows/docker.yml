name: Build & Publish Docker Images

on:
  push:
    branches: [main, feat/distributed-nodes, feat/cloud-platform]
    tags: ["v*", "cloud", "cloud-*", "stable"]
    paths:
      - "web/**"
      - "backend/**"
      - "device_utils.py"
      - "pyproject.toml"
      - "uv.lock"
      - "CorridorKeyModule/**"
      - "Dockerfile"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set build number
        id: buildnum
        run: echo "ts=$(git log -1 --format=%ct)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/corridorkey-web
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=cloud,enable=${{ startsWith(github.ref, 'refs/tags/cloud') }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/tags/stable' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_NUMBER=${{ steps.buildnum.outputs.ts }}
            CKWEB_FILE_BASE=files.corridorkey.cloud
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-node:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cloud') || github.ref == 'refs/tags/stable' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - gpu_vendor: nvidia
          - gpu_vendor: amd
    steps:
      - uses: actions/checkout@v4

      - name: Set build number
        id: buildnum
        run: echo "ts=$(git log -1 --format=%ct)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile.node
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.lower.outputs.owner }}/corridorkey-node:${{ matrix.gpu_vendor }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_NUMBER=${{ steps.buildnum.outputs.ts }}
            GPU_VENDOR=${{ matrix.gpu_vendor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
